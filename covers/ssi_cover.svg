<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">

  <!-- ──────────────────────────── DEFS ──────────────────────────── -->
  <defs>
    <!-- Deep navy radial background -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%"   stop-color="#1a2540"/>
      <stop offset="55%"  stop-color="#0d1428"/>
      <stop offset="100%" stop-color="#05080f"/>
    </radialGradient>

    <!-- Subtle vertical sheen at top -->
    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- The AI engine core -->
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#88b8ff" stop-opacity="1"/>
      <stop offset="35%"  stop-color="#4f7ef8" stop-opacity="0.95"/>
      <stop offset="75%"  stop-color="#2945a8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a2540" stop-opacity="0"/>
    </radialGradient>

    <!-- Engine halo glow -->
    <radialGradient id="haloGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#4f7ef8" stop-opacity="0.35"/>
      <stop offset="50%"  stop-color="#4f7ef8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#4f7ef8" stop-opacity="0"/>
    </radialGradient>

    <!-- Output card subtle gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e2a4a"/>
      <stop offset="100%" stop-color="#162038"/>
    </linearGradient>

    <!-- Flow line gradient (left → center: cyan; center → right: green) -->
    <linearGradient id="flowL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4f7ef8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#4f7ef8" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="flowR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2dd4bf" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow filter for the engine core -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Stronger outer halo blur -->
    <filter id="bigBlur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>

    <!-- Subtle drop shadow for output cards -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ──────────────────────── BACKGROUND ──────────────────────── -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  <rect width="1920" height="1080" fill="url(#sheen)"/>

  <!-- Faint dot grid texture -->
  <g fill="#2a3550" opacity="0.18">
    <!-- 24 cols × 13 rows of tiny dots, ~80px spacing -->
    <g>
      <!-- generated dot pattern -->
      <pattern id="dotGrid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
        <circle cx="2" cy="2" r="1.2"/>
      </pattern>
    </g>
    <rect width="1920" height="1080" fill="url(#dotGrid)"/>
  </g>

  <!-- ─────────── STAGE LABELS (top of canvas, very subtle) ─────────── -->
  <g font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
     font-size="14" letter-spacing="3" fill="#5f6f8f" font-weight="600">
    <text x="290"  y="120" text-anchor="middle">01 · RAW NOTES</text>
    <text x="960"  y="120" text-anchor="middle">02 · INTELLIGENCE ENGINE</text>
    <text x="1630" y="120" text-anchor="middle">03 · ACTIONABLE OUTPUT</text>
  </g>

  <!-- ─────────────── ZONE 1: RAW / UNSTRUCTURED NOTES ─────────────── -->
  <g transform="translate(0,0)">
    <!-- scattered note dots -->
    <g fill="#3a4570" opacity="0.55">
      <circle cx="100" cy="280" r="3"/>  <circle cx="170" cy="330" r="2.5"/>
      <circle cx="240" cy="260" r="3"/>  <circle cx="310" cy="370" r="2"/>
      <circle cx="380" cy="290" r="3"/>  <circle cx="450" cy="350" r="2.5"/>
      <circle cx="160" cy="430" r="3"/>  <circle cx="240" cy="490" r="2"/>
      <circle cx="330" cy="450" r="3"/>  <circle cx="420" cy="510" r="2.5"/>
      <circle cx="110" cy="560" r="3"/>  <circle cx="200" cy="620" r="2"/>
      <circle cx="290" cy="580" r="3"/>  <circle cx="380" cy="650" r="2.5"/>
      <circle cx="470" cy="600" r="3"/>  <circle cx="130" cy="710" r="2"/>
      <circle cx="220" cy="760" r="3"/>  <circle cx="310" cy="730" r="2.5"/>
      <circle cx="400" cy="800" r="3"/>  <circle cx="490" cy="750" r="2"/>
    </g>

    <!-- scattered note lines (fragments of text) -->
    <g stroke="#4a5b7a" stroke-width="3" stroke-linecap="round" opacity="0.7">
      <line x1="90"  y1="320" x2="240" y2="320"/>
      <line x1="100" y1="395" x2="200" y2="395"/>
      <line x1="240" y1="420" x2="430" y2="420"/>
      <line x1="120" y1="500" x2="280" y2="500"/>
      <line x1="300" y1="530" x2="450" y2="530"/>
      <line x1="140" y1="650" x2="310" y2="650"/>
      <line x1="220" y1="690" x2="380" y2="690"/>
      <line x1="120" y1="780" x2="290" y2="780"/>
    </g>

    <!-- 3 messy sticky-note style cards (tilted, dim) -->
    <g opacity="0.85">
      <g transform="translate(140,210) rotate(-7)">
        <rect width="190" height="120" rx="8" fill="#283555" stroke="#3a4570" stroke-width="1.5"/>
        <line x1="20" y1="32" x2="155" y2="32" stroke="#4a5b7a" stroke-width="3" stroke-linecap="round"/>
        <line x1="20" y1="55" x2="125" y2="55" stroke="#4a5b7a" stroke-width="3" stroke-linecap="round"/>
        <line x1="20" y1="78" x2="155" y2="78" stroke="#4a5b7a" stroke-width="3" stroke-linecap="round"/>
        <line x1="20" y1="100" x2="100" y2="100" stroke="#4a5b7a" stroke-width="3" stroke-linecap="round"/>
        <text x="20" y="22" font-family="Arial,sans-serif" font-size="11" fill="#7080a0" font-weight="600" letter-spacing="1">HUBSPOT NOTE</text>
      </g>
      <g transform="translate(310,440) rotate(4)">
        <rect width="190" height="120" rx="8" fill="#283555" stroke="#3a4570" stroke-width="1.5"/>
        <line x1="20" y1="32" x2="155" y2="32" stroke="#4a5b7a" stroke-width="3" stroke-linecap="round"/>
        <line x1="20" y1="55" x2="110" y2="55" stroke="#4a5b7a" stroke-width="3" stroke-linecap="round"/>
        <line x1="20" y1="78" x2="155" y2="78" stroke="#4a5b7a" stroke-width="3" stroke-linecap="round"/>
        <line x1="20" y1="100" x2="135" y2="100" stroke="#4a5b7a" stroke-width="3" stroke-linecap="round"/>
        <text x="20" y="22" font-family="Arial,sans-serif" font-size="11" fill="#7080a0" font-weight="600" letter-spacing="1">EXCEL ROW</text>
      </g>
      <g transform="translate(110,640) rotate(-3)">
        <rect width="190" height="120" rx="8" fill="#283555" stroke="#3a4570" stroke-width="1.5"/>
        <line x1="20" y1="32" x2="155" y2="32" stroke="#4a5b7a" stroke-width="3" stroke-linecap="round"/>
        <line x1="20" y1="55" x2="140" y2="55" stroke="#4a5b7a" stroke-width="3" stroke-linecap="round"/>
        <line x1="20" y1="78" x2="120" y2="78" stroke="#4a5b7a" stroke-width="3" stroke-linecap="round"/>
        <line x1="20" y1="100" x2="155" y2="100" stroke="#4a5b7a" stroke-width="3" stroke-linecap="round"/>
        <text x="20" y="22" font-family="Arial,sans-serif" font-size="11" fill="#7080a0" font-weight="600" letter-spacing="1">MEETING TRANSCRIPT</text>
      </g>
    </g>
  </g>

  <!-- ─────────────── FLOW LINES (left → center) ─────────────── -->
  <g fill="none" stroke="url(#flowL)" stroke-width="1.5" opacity="0.85">
    <path d="M 510 320 C 650 350 720 430 880 500"/>
    <path d="M 540 470 C 680 490 740 500 880 520"/>
    <path d="M 510 620 C 670 600 740 580 880 550"/>
    <path d="M 540 760 C 680 700 740 620 880 580"/>
  </g>

  <!-- ─────────────── ZONE 2: AI ENGINE (CENTER) ─────────────── -->
  <g transform="translate(960,540)">
    <!-- Outer big halo -->
    <circle r="380" fill="url(#haloGrad)" filter="url(#bigBlur)"/>
    <!-- Mid halo -->
    <circle r="230" fill="url(#haloGrad)"/>

    <!-- The hexagonal lens (rotated 30°) -->
    <g filter="url(#softGlow)">
      <polygon points="0,-160 138,-80 138,80 0,160 -138,80 -138,-80"
               fill="url(#coreGrad)" stroke="#88b8ff" stroke-width="2" opacity="0.95"/>
      <polygon points="0,-115 100,-58 100,58 0,115 -100,58 -100,-58"
               fill="none" stroke="#cfe0ff" stroke-width="1.2" opacity="0.6"/>
    </g>

    <!-- Inner neural network nodes (small dots + connecting lines) -->
    <g stroke="#ffffff" stroke-width="1" opacity="0.55" fill="none">
      <line x1="-55" y1="-30" x2="0"   y2="-60"/>
      <line x1="0"   y1="-60" x2="55"  y2="-30"/>
      <line x1="-55" y1="-30" x2="-30" y2="30"/>
      <line x1="55"  y1="-30" x2="30"  y2="30"/>
      <line x1="-30" y1="30"  x2="0"   y2="65"/>
      <line x1="30"  y1="30"  x2="0"   y2="65"/>
      <line x1="0"   y1="-60" x2="-30" y2="30"/>
      <line x1="0"   y1="-60" x2="30"  y2="30"/>
    </g>
    <g fill="#ffffff">
      <circle cx="0"   cy="-60" r="4.5"/>
      <circle cx="-55" cy="-30" r="4"/>
      <circle cx="55"  cy="-30" r="4"/>
      <circle cx="-30" cy="30"  r="4"/>
      <circle cx="30"  cy="30"  r="4"/>
      <circle cx="0"   cy="65"  r="4.5"/>
    </g>

    <!-- "SSI" mark center -->
    <text x="0" y="105" text-anchor="middle"
          font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
          font-size="14" font-weight="700" letter-spacing="4" fill="#cfe0ff">CLAUDE · AI</text>
  </g>

  <!-- ─────────────── FLOW LINES (center → right) ─────────────── -->
  <g fill="none" stroke="url(#flowR)" stroke-width="1.5" opacity="0.9">
    <path d="M 1040 470 C 1180 460 1260 410 1360 380"/>
    <path d="M 1050 540 C 1200 540 1260 540 1360 540"/>
    <path d="M 1040 610 C 1180 620 1260 670 1360 700"/>
  </g>

  <!-- ─────────────── ZONE 3: STRUCTURED INTELLIGENCE ─────────────── -->
  <g transform="translate(1360,210)">

    <!-- Card 1: Account Brief -->
    <g filter="url(#cardShadow)">
      <rect width="430" height="180" rx="14" fill="url(#cardGrad)" stroke="#2a3550" stroke-width="1.5"/>
      <rect width="6" height="180" rx="3" fill="#34d399"/>
      <text x="28" y="38" font-family="Arial,sans-serif" font-size="13"
            font-weight="700" letter-spacing="2.5" fill="#8aa0c8">ACCOUNT BRIEF</text>
      <text x="28" y="68" font-family="Arial,sans-serif" font-size="22"
            font-weight="700" fill="#e2e8f0">Acme GmbH</text>
      <g>
        <circle cx="36" cy="100" r="6" fill="#34d399"/>
        <text x="52" y="105" font-family="Arial,sans-serif" font-size="14" fill="#a0b0d0">Deal health: <tspan font-weight="700" fill="#34d399">hot</tspan></text>
      </g>
      <g>
        <circle cx="36" cy="128" r="6" fill="#4f7ef8"/>
        <text x="52" y="133" font-family="Arial,sans-serif" font-size="14" fill="#a0b0d0">Momentum: <tspan font-weight="700" fill="#4f7ef8">improving</tspan></text>
      </g>
      <g>
        <circle cx="36" cy="156" r="6" fill="#fbbf24"/>
        <text x="52" y="161" font-family="Arial,sans-serif" font-size="14" fill="#a0b0d0">Next step: deliver tech deck</text>
      </g>
    </g>

    <!-- Card 2: Pipeline Card -->
    <g transform="translate(0,210)" filter="url(#cardShadow)">
      <rect width="430" height="120" rx="14" fill="url(#cardGrad)" stroke="#2a3550" stroke-width="1.5"/>
      <rect width="6" height="120" rx="3" fill="#fbbf24"/>
      <text x="28" y="38" font-family="Arial,sans-serif" font-size="13"
            font-weight="700" letter-spacing="2.5" fill="#8aa0c8">PIPELINE · NEGOTIATION</text>
      <text x="28" y="68" font-family="Arial,sans-serif" font-size="20"
            font-weight="700" fill="#e2e8f0">Beta Automotive AG</text>
      <g font-family="Arial,sans-serif" font-size="11" font-weight="700" letter-spacing="0.5">
        <rect x="28"  y="86" width="68" height="22" rx="11" fill="#1e3a3a" stroke="#2dd4bf" stroke-width="1"/>
        <text x="62" y="101" text-anchor="middle" fill="#2dd4bf">PCF</text>
        <rect x="106" y="86" width="98" height="22" rx="11" fill="#2a2440" stroke="#a78bfa" stroke-width="1"/>
        <text x="155" y="101" text-anchor="middle" fill="#a78bfa">EDC Connector</text>
        <rect x="214" y="86" width="80" height="22" rx="11" fill="#3a2a1a" stroke="#fbbf24" stroke-width="1"/>
        <text x="254" y="101" text-anchor="middle" fill="#fbbf24">€220K</text>
      </g>
    </g>

    <!-- Card 3: GitHub Issue Draft -->
    <g transform="translate(0,360)" filter="url(#cardShadow)">
      <rect width="430" height="170" rx="14" fill="url(#cardGrad)" stroke="#2a3550" stroke-width="1.5"/>
      <rect width="6" height="170" rx="3" fill="#a78bfa"/>
      <text x="28" y="38" font-family="Arial,sans-serif" font-size="13"
            font-weight="700" letter-spacing="2.5" fill="#8aa0c8">GITHUB ISSUE · DRAFT</text>
      <text x="28" y="68" font-family="Arial,sans-serif" font-size="18"
            font-weight="700" fill="#e2e8f0">[Feature] SAP S/4HANA BOM integration</text>
      <text x="28" y="93" font-family="Arial,sans-serif" font-size="13" fill="#a0b0d0">Validated by 3 customer meetings</text>
      <g font-family="Arial,sans-serif" font-size="11" font-weight="700" letter-spacing="0.5">
        <rect x="28"  y="108" width="120" height="22" rx="11" fill="#2a2440" stroke="#a78bfa" stroke-width="1"/>
        <text x="88"  y="123" text-anchor="middle" fill="#a78bfa">feature-request</text>
        <rect x="158" y="108" width="100" height="22" rx="11" fill="#1e3a3a" stroke="#2dd4bf" stroke-width="1"/>
        <text x="208" y="123" text-anchor="middle" fill="#2dd4bf">edc-connector</text>
        <rect x="268" y="108" width="130" height="22" rx="11" fill="#1e3a2a" stroke="#34d399" stroke-width="1"/>
        <text x="333" y="123" text-anchor="middle" fill="#34d399">customer-validated</text>
      </g>
      <g>
        <circle cx="38" cy="148" r="5" fill="#34d399"/>
        <text x="50" y="153" font-family="Arial,sans-serif" font-size="12" fill="#a0b0d0">Auto-pushed to backlog · 1-click</text>
      </g>
    </g>
  </g>

  <!-- ─────────────── TITLE BLOCK (Bottom) ─────────────── -->
  <g transform="translate(0,890)">
    <!-- top divider line -->
    <line x1="120" y1="0" x2="1800" y2="0" stroke="#2a3550" stroke-width="1"/>

    <text x="120" y="60"
          font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
          font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1">
      sovity Sales Intelligence
    </text>
    <text x="120" y="105"
          font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
          font-size="22" font-weight="400" fill="#8aa0c8" letter-spacing="0.5">
      From raw meeting notes to product backlog — automatically.
    </text>

    <!-- right-side tags -->
    <g font-family="Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="1.5" transform="translate(1800,55)">
      <g text-anchor="end">
        <text fill="#4f7ef8">AI-POWERED</text>
        <text y="26" fill="#2dd4bf">CATENA-X READY</text>
        <text y="52" fill="#34d399">PRODUCT INTEL → GITHUB</text>
      </g>
    </g>

    <!-- sovity wordmark (top-left of title area) -->
    <g transform="translate(120,160)" opacity="0.85">
      <circle cx="0" cy="0" r="9" fill="#4f7ef8"/>
      <text x="20" y="6" font-family="Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="3" fill="#a0b0d0">SOVITY · INTERNAL TOOL</text>
    </g>
  </g>

</svg>
